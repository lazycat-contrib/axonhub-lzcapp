name: AxonHub
package: community.lazycat.app.axonhub
version: 0.9.23
min_os_version: 1.3.8
description: "All-in-one AI 开发平台"
homepage: https://github.com/looplj/axonhub
author: looplj

application:
  subdomain: axonhub
  background_task: true
  public_path:
    - /

  upstreams:
    - location: /
      backend: http://axonhub:{{.U.server_port}}/

services:
  axonhub:
    # looplj/axonhub:v0.9.23
    image: registry.lazycat.cloud/czyt/looplj/axonhub:db900bebc36f0138
    container_name: axonhub
    environment:
      # 数据库配置 - 用户可配置
      - AXONHUB_DB_DIALECT={{.U.db_dialect}}
      - AXONHUB_DB_DSN={{.U.db_dsn}}
      # 服务配置
      - AXONHUB_SERVER_PORT={{.U.server_port}}
      # 日志配置
      - AXONHUB_LOG_LEVEL={{.U.log_level}}
      - AXONHUB_LOG_ENCODING={{.U.log_encoding}}
    binds:
      - /lzcapp/var/data:/data
      - /lzcapp/var/config:/config
    healthcheck:
      test:
        - CMD-SHELL
        - "wget --no-verbose --tries=1 --spider http://localhost:{{.U.server_port}}/health"
      start_period: 30s
      timeout: 40s
    setup_script: |
      if [ ! -f /lzcapp/var/config/config.yaml ]; then
         cp -r /app/config.yaml /lzcapp/var/config/config.yaml
      fi
      rm /app/config.yaml
      ln -s /lzcapp/var/config/config.yaml /app/config.yaml

locales:
  zh:
    name: AxonHub
    description: "All-in-one AI 开发平台"
  en:
    name: AxonHub
    description: "All-in-one AI Development Platform"
